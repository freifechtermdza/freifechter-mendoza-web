<svg viewBox="0 0 340 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="crestTitle">
  <title id="crestTitle">Freifechter Mendoza — sello del club</title>

  <defs>
    <path id="arcLeft" d="M170,32 A118,118 0 0,0 52,150" fill="none"/>
    <path id="arcRight" d="M170,32 A118,118 0 0,1 288,150" fill="none"/>
