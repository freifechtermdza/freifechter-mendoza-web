    <text font-size="9.5" letter-spacing="2.2" fill="#d9b45c" stroke="none" style="font-family:'Cinzel',serif">
      <textPath href="#arcLeft" startOffset="3">IN SAPIENTIA INCIPIT VICTORIA</textPath>
    </text>
    <text font-size="9.5" letter-spacing="2.2" fill="#d9b45c" stroke="none" style="font-family:'Cinzel',serif">
      <textPath href="#arcRight" startOffset="3">PERITIA IN GLADIO · GLORIA IN VITA</textPath>
    </text>

